<style>
  :root {
    --red: #C8102E;
    --navy: #003087;
    --silver: #A2AAAD;
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --text1: #ffffff;
    --text2: #aaaaaa;
    --text3: #666666;
    --gold: #FFD700;
    --silver-medal: #C0C0C0;
    --bronze: #CD7F32;
    --green: #22c55e;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text1);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: var(--red);
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    text-align: center;
    position: relative;
    flex-shrink: 0;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .logo-mark {
    display: flex;
    align-items: baseline;
    gap: 0px;
  }

  .logo-gt {
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
  }

  .logo-4 {
    font-size: 32px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1;
  }

  .header-text { text-align: left; }
  .header-series { font-size: 9px; color: rgba(255,255,255,0.6); letter-spacing: 3px; font-weight: 500; text-transform: uppercase; }
  .header-title { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 0.5px; line-height: 1.1; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }

  .flag-strip {
    display: flex;
    height: 4px;
    margin-top: 10px;
  }
  .flag-red { background: var(--red); flex: 1; }
  .flag-white { background: #fff; flex: 1; }
  .flag-blue { background: var(--navy); flex: 1; }

  /* TABS */
  .tabs {
    display: flex;
    background: #111;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 12px 4px 10px;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    color: var(--text3);
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .tab.active { color: #fff; border-bottom: 2px solid var(--red); }
  .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

  /* CONTENT */
  .tab-content { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bottom) + 20px); }
  .tab-content.active { display: block; }

  /* STANDINGS */
  .section-header {
    padding: 10px 16px 6px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: grid;
    grid-template-columns: 36px 1fr 56px 52px;
    gap: 4px;
  }
  .section-header .r { text-align: right; }

  .entry-row {
    display: grid;
    grid-template-columns: 36px 1fr 56px 52px;
    gap: 4px;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .entry-row:active { background: var(--bg3); }
  .entry-row.bimmer { background: rgba(0,48,135,0.12); }
  .entry-row.bimmer:active { background: rgba(0,48,135,0.2); }

  .pos-wrap { display: flex; align-items: center; justify-content: center; }
  .pos-badge {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .p1 { background: var(--gold); color: #5a4200; }
  .p2 { background: var(--silver-medal); color: #333; }
  .p3 { background: var(--bronze); color: #3a1800; }
  .pn { background: var(--bg3); color: var(--text2); }

  .entry-info { min-width: 0; }
  .entry-car {
    font-size: 14px; font-weight: 600; color: var(--text1);
    display: flex; align-items: center; gap: 5px;
  }
  .entry-team { font-size: 11px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .bmw-tag {
    font-size: 8px; font-weight: 700; background: var(--navy);
    color: #fff; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.5px;
  }
  .star-tag {
    font-size: 8px; font-weight: 700; background: var(--red);
    color: #fff; padding: 1px 5px; border-radius: 3px;
  }

  .pts-col { text-align: right; font-size: 17px; font-weight: 700; color: var(--text1); }
  .gap-col { text-align: right; font-size: 12px; color: var(--text2); }

  /* RACES */
  .race-card {
    margin: 8px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .race-header-row {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }

  .race-left { flex: 1; min-width: 0; }
  .race-round { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .race-venue { font-size: 14px; font-weight: 600; color: var(--text1); margin-top: 1px; }
  .race-date { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .race-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; margin-left: 8px; }
  .badge-done { background: rgba(34,197,94,0.15); color: var(--green); font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .badge-soon { background: var(--bg3); color: var(--text3); font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .chevron { font-size: 14px; color: var(--text3); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  .race-body { display: none; border-top: 1px solid var(--border); }
  .race-body.open { display: block; }

  .session-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
  }
  .session-row:last-child { border-bottom: none; }
  .session-row:active { background: var(--bg3); }
  .session-name { font-size: 13px; color: var(--text1); font-weight: 500; }
  .session-win { font-size: 11px; color: var(--text2); text-align: right; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .enduro-tag { display: inline-block; font-size: 8px; font-weight: 700; background: var(--navy); color: #fff; padding: 1px 4px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }

  .results-link {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 10px 14px;
    font-size: 12px; color: #60a5fa;
    cursor: pointer;
    border-top: 1px solid var(--border);
    text-decoration: none;
  }
  .results-link:active { background: var(--bg3); }

  .upcoming-msg { padding: 12px 14px; font-size: 12px; color: var(--text3); font-style: italic; }

  /* BREAKDOWN */
  .bd-list-hint { padding: 10px 16px 4px; font-size: 11px; color: var(--text3); }

  .back-row {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 16px 8px;
    font-size: 13px; color: var(--text2);
    cursor: pointer; border: none; background: transparent;
    width: 100%;
  }
  .back-row:active { color: var(--text1); }

  .bd-title-block {
    padding: 10px 16px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .bd-car { font-size: 15px; font-weight: 700; color: var(--text1); display: flex; align-items: center; gap: 6px; }
  .bd-team { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .pts-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .pts-cell { text-align: center; }
  .pts-cell-label { font-size: 8px; color: var(--text3); margin-bottom: 3px; line-height: 1.2; }
  .pts-cell-val { font-size: 14px; font-weight: 700; }
  .val-best { color: var(--red); }
  .val-enduro { color: var(--navy); }
  .val-normal { color: var(--text1); }
  .val-zero { color: var(--text3); }

  .bars-block { padding: 12px 16px; }
  .bar-row { display: grid; grid-template-columns: 56px 1fr 32px; gap: 8px; align-items: center; margin-bottom: 7px; }
  .bar-label { font-size: 10px; color: var(--text3); }
  .bar-track { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .bar-pos { font-size: 11px; font-weight: 600; text-align: right; color: var(--text1); }

  .bd-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .bd-total-label { font-size: 13px; color: var(--text2); }
  .bd-total-val { font-size: 20px; font-weight: 800; color: var(--text1); }

  .legend { display: flex; gap: 12px; padding: 4px 16px 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text3); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 0; }

  /* Points key card */
  .key-card {
    margin: 8px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .key-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .key-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .key-pt { text-align: center; background: var(--bg3); border-radius: 6px; padding: 4px 6px; min-width: 34px; }
  .key-pos { font-size: 9px; color: var(--text3); }
  .key-val { font-size: 13px; font-weight: 700; color: var(--text1); }
  .key-val.double { color: var(--navy); }

  .last-updated { text-align: center; font-size: 10px; color: var(--text3); padding: 8px 16px 4px; }
</style>
</head>

function posFromPts(p, enduro) {
  const scale = enduro ? PTS_ENDURO : PTS_SPRINT;
  const idx = scale.indexOf(p);
  return idx >= 0 ? 'P'+(idx+1) : p > 0 ? 'P?' : '—';

// ============================================================
// BREAKDOWN DETAIL
// ============================================================
function showBreakdown(idx) {
  const e = ENTRIES[idx];
  const maxPts = Math.max(...e.pts);
  const racedCount = e.pts.filter(p=>p>0).length;

  // only show races that have happened (any car scored) or this car raced
  const totalRaces = 13;
  const racesRun = e.pts.filter((p,i) => ENTRIES.some(en => en.pts[i] > 0)).length;

  document.getElementById('breakdown-view').innerHTML = `
    <button class="back-row" onclick="showBreakdownList()">
      ‹ All Cars
    </button>
    <div class="bd-title-block">
      <div class="bd-car">
        ${e.car}
        ${mfrBadge(e.team)}
      </div>
      <div class="bd-team">${e.team}</div>
    </div>

    <div class="pts-grid">
      ${e.pts.slice(0, racesRun > 0 ? Math.max(racesRun, 7) : 7).map((p,i) => {
        const scored = ENTRIES.some(en => en.pts[i] > 0);
        if (!scored) return '';
        const isBest = (IS_ENDURO[i] ? p === 50 : p === 25);
        const cellColor = (IS_ENDURO[i] ? p === 50 : p === 25) ? '#c8102e' : p > 0 ? '#ffffff' : null;
        const cls = p > 0 ? '' : 'val-zero';
        return `<div class="pts-cell">
          <div class="pts-cell-label">${RACE_LABELS[i]}</div>
          <div class="pts-cell-val ${cls}" style="${cellColor?'color:'+cellColor+';':''}">${p > 0 ? p : '—'}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="bars-block">
      ${e.pts.map((p,i) => {
        const scored = ENTRIES.some(en => en.pts[i] > 0);
        if (!scored) return '';
        const scale = IS_ENDURO[i] ? 50 : 25;
        const pct = Math.round((p / scale) * 100);
        const isBest = (IS_ENDURO[i] ? p === 50 : p === 25);
        const barColor = p > 0 ? posColor(p, IS_ENDURO[i]) : 'var(--bg3)';
        const posLabel = posFromPts(p, IS_ENDURO[i]);
        return `<div class="bar-row">
          <div class="bar-label">${RACE_LABELS[i].replace('\\n',' ')}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${barColor}"></div>
          </div>
          <div class="bar-pos">${posLabel}</div>
        </div>`;
      }).join('')}
    </div>



    <div class="bd-total">
      <span class="bd-total-label">Total · ${racedCount} of ${totalRaces} races scored</span>
      <span class="bd-total-val">${e.total} pts</span>
    </div>`;
}

function mfrBadge(team) {
  const m = MFR_MAP[team];
  if (!m) return '';
  return `<span style="display:inline-flex;align-items:center;vertical-align:middle;margin-left:4px">${mfrLogo(m.mfr)}</span>`;
}

function posColor(pts, enduro) {
  if (!pts || pts === 0) return '#555';
  const scale = enduro ? PTS_ENDURO : PTS_SPRINT;
  const idx = scale.indexOf(pts);
  if (idx < 0) return '#555';
  return POS_COLORS[Math.min(idx, POS_COLORS.length - 1)];
}
